name: Release and Publish to NuGet

on:
  workflow_dispatch:
    branches:
      - 'release/**'

jobs:
  publish:
    name: Build and Publish NuGet Packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - { rid: 'win-x64', libname: 'pdfium.dll' }
          - { rid: 'osx-arm64', libname: 'libpdfium.dylib' }
          - { rid: 'osx-x64', libname: 'libpdfium.dylib' }
          - { rid: 'linux-x64', libname: 'libpdfium.so' }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from branch name
        id: extract_version
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          VERSION="${BRANCH_NAME#release/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/PdfiumWrapper/PdfiumWrapper.csproj

      - name: Build for ${{ matrix.platform.rid }}
        run: |
          dotnet build src/PdfiumWrapper/PdfiumWrapper.csproj \
            --configuration Release \
            --no-restore \
            /p:NativeRid=${{ matrix.platform.rid }} \
            /p:NativeLibName=${{ matrix.platform.libname }} \
            /p:Version=${{ steps.extract_version.outputs.version }} \
            /p:FileVersion=${{ steps.extract_version.outputs.version }} \
            /p:AssemblyVersion=${{ steps.extract_version.outputs.version }}

      - name: Pack NuGet package for ${{ matrix.platform.rid }}
        run: |
          dotnet pack src/PdfiumWrapper/PdfiumWrapper.csproj \
            --configuration Release \
            --no-build \
            /p:NativeRid=${{ matrix.platform.rid }} \
            /p:NativeLibName=${{ matrix.platform.libname }} \
            /p:Version=${{ steps.extract_version.outputs.version }} \
            /p:FileVersion=${{ steps.extract_version.outputs.version }} \
            /p:AssemblyVersion=${{ steps.extract_version.outputs.version }}

      - name: Publish to NuGet
        run: |
          dotnet nuget push src/PdfiumWrapper/bin/Release/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
